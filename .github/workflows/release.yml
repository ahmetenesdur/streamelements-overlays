name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: relay/package-lock.json
      - name: Install relay dependencies
        run: cd relay && npm ci
      - name: Validate & Test
        run: npm test
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            widget/widget.html
            widget/widget.css
            widget/widget.js
            widget/widget.json
