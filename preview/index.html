<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Multistream Chat — Preview</title>

  <!-- The actual widget stylesheet (single source of truth) -->
  <link rel="stylesheet" href="../widget/widget.css" />

  <style>
    /* ---- preview-only chrome (NOT part of the widget) ---- */
    :root {
      /* Preview-chrome tokens are namespaced (--pv-*) so they can NEVER bleed
         into the widget's own CSS custom properties (e.g. --accent). The widget
         must render with its real default accent, not the panel's blue. */
      --pw: 340px;            /* panel width */
      --ink: #e9eaf0; --mut: #8b8f9c; --line: rgba(255,255,255,.08);
      --field-bg: #16181f; --field-bd: rgba(255,255,255,.10);
      --pv-accent: #6ea8fe;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; color: var(--ink); }

    /* Default stage = clean flat dark, so the chat itself is easy to judge.
       Switch to a colored/photo scene below to test glass over video. */
    #stage {
      position: absolute; inset: 0 var(--pw) 0 0;
      background: #15161b;
    }
    #stage[class*="scene-"] { background-size: cover; background-position: center; background-repeat: no-repeat; }
    #stage.scene-aurora {
      background-image:
        radial-gradient(60% 80% at 20% 15%, #1b6f8c 0%, transparent 60%),
        radial-gradient(70% 90% at 85% 25%, #7b2ff7 0%, transparent 55%),
        radial-gradient(90% 90% at 60% 95%, #1f8a5b 0%, transparent 60%),
        linear-gradient(160deg, #0b1020 0%, #0a0a12 100%);
    }
    #stage.scene-sunset {
      background-image:
        radial-gradient(80% 70% at 30% 90%, #ff7e5f 0%, transparent 55%),
        radial-gradient(70% 70% at 80% 20%, #feb47b 0%, transparent 50%),
        linear-gradient(160deg, #2b1055 0%, #7597de 100%);
    }
    #stage.scene-game {
      background-image:
        repeating-linear-gradient(115deg, #0e1630 0 22px, #142046 22px 44px),
        radial-gradient(100% 80% at 70% 20%, #2dd4bf55 0%, transparent 60%);
    }
    #stage.scene-light {
      background-image:
        radial-gradient(70% 70% at 25% 20%, #ffffff 0%, transparent 55%),
        radial-gradient(80% 80% at 80% 80%, #cfe0ff 0%, transparent 60%),
        linear-gradient(160deg, #eef2f9 0%, #dfe6f2 100%);
    }
    #stage.scene-checker {
      background-color: #14141c;
      background-image:
        linear-gradient(45deg, #1b1b25 25%, transparent 25%),
        linear-gradient(-45deg, #1b1b25 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1b1b25 75%),
        linear-gradient(-45deg, transparent 75%, #1b1b25 75%);
      background-size: 28px 28px;
      background-position: 0 0, 0 14px, 14px -14px, -14px 0;
    }

    /* ---- panel: clean, Apple-ish, grouped + collapsible ---- */
    #panel {
      position: absolute; top: 0; right: 0; bottom: 0; width: var(--pw);
      background: #0c0d11; border-left: 1px solid var(--line);
      overflow-y: auto; font-size: 13px;
    }
    #panel header { padding: 16px 16px 10px; position: sticky; top: 0; background: #0c0d11; z-index: 2; border-bottom: 1px solid var(--line); }
    #panel h1 { font-size: 15px; margin: 0; letter-spacing: -.01em; font-weight: 650; }
    #panel .sub { font-size: 11px; color: var(--mut); margin: 3px 0 0; }

    .grp { border-bottom: 1px solid var(--line); }
    .grp > summary {
      list-style: none; cursor: pointer; user-select: none;
      padding: 11px 16px; font-size: 11px; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; color: var(--mut); display: flex; align-items: center; gap: 8px;
    }
    .grp > summary::-webkit-details-marker { display: none; }
    .grp > summary::before { content: "›"; transition: transform .15s ease; font-size: 14px; color: var(--mut); }
    .grp[open] > summary::before { transform: rotate(90deg); }
    .grp > summary:hover { color: var(--ink); }
    .pad { padding: 4px 16px 14px; display: flex; flex-direction: column; gap: 9px; }

    .field { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px; }
    .field > label { color: #c7cad4; font-size: 12px; line-height: 1.3; }
    .field .ctl { justify-self: end; width: 150px; }
    .field.wide { grid-template-columns: 1fr; }
    .field.wide .ctl { width: 100%; }

    select, input[type=text], input[type=number] {
      width: 150px; background: var(--field-bg); color: var(--ink);
      border: 1px solid var(--field-bd); border-radius: 7px; padding: 6px 8px; font-size: 12px; font-family: inherit;
    }
    .field.wide select, .field.wide input { width: 100%; }
    input[type=range] { width: 150px; accent-color: var(--pv-accent); }
    input[type=color] { width: 34px; height: 26px; padding: 0; border: 1px solid var(--field-bd); border-radius: 6px; background: var(--field-bg); }
    .rangewrap { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
    .rangewrap .val { font-variant-numeric: tabular-nums; color: var(--mut); font-size: 11px; min-width: 30px; text-align: right; }
    .colorwrap { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
    .colorwrap input[type=text] { width: 108px; }

    .row { display: flex; flex-wrap: wrap; gap: 6px; }
    button.sim {
      flex: 1 1 auto; background: var(--field-bg); color: var(--ink); border: 1px solid var(--field-bd);
      border-radius: 7px; padding: 7px 9px; font-size: 12px; cursor: pointer; font-family: inherit;
    }
    button.sim:hover { background: #1f222b; }
    button.sim.tw { border-color: #9146ff66; } button.sim.yt { border-color: #ff000066; }
    button.sim.kk { border-color: #53fc1866; } button.sim.al { border-color: #e9c37c66; }
    button.fieldbtn { width: 100%; }
    .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--mut); margin-top: 4px; }
  </style>
</head>
<body>
  <!-- ===== widget DOM (mirror of widget.html) ===== -->
  <div id="stage">
    <div class="se-chat" id="seChat" data-layout="vertical" data-halign="left" data-valign="bottom">
      <div class="se-chat__list" id="chatList"></div>
    </div>
  </div>

  <!-- ===== preview control panel ===== -->
  <aside id="panel">
    <header>
      <h1>Multistream Chat</h1>
      <p class="sub">Live preview — every setting below is the real widget field.</p>
    </header>

    <details open class="grp">
      <summary>Simulate</summary>
      <div class="pad">
        <div class="row">
          <button class="sim tw" data-act="twitch">Twitch</button>
          <button class="sim yt" data-act="youtube">YouTube</button>
          <button class="sim kk" data-act="kick">Kick</button>
        </div>
        <div class="row">
          <button class="sim" data-act="action">/me</button>
          <button class="sim" data-act="long">Long</button>
          <button class="sim" data-act="emote">Emotes</button>
          <button class="sim" data-act="seventv">7TV</button>
          <button class="sim" data-act="keywords">Keywords</button>
        </div>
        <div class="lbl">Alerts</div>
        <div class="row">
          <button class="sim al" data-act="alert:follow">Follow</button>
          <button class="sim al" data-act="alert:sub">Sub</button>
          <button class="sim al" data-act="alert:tip">Tip</button>
          <button class="sim al" data-act="alert:cheer">Cheer</button>
          <button class="sim al" data-act="alert:raid">Raid</button>
        </div>
        <div class="lbl">Control</div>
        <div class="row">
          <button class="sim" data-act="rain">Rain ×20</button>
          <button class="sim" data-act="deleteLast">Delete last</button>
          <button class="sim" data-act="clear">Clear</button>
        </div>
        <div class="field"><label>Preview scene</label>
          <select class="ctl" data-scene>
            <option value="">Plain dark</option>
            <option value="scene-aurora">Aurora</option>
            <option value="scene-sunset">Sunset</option>
            <option value="scene-game">Game grid</option>
            <option value="scene-light">Light</option>
            <option value="scene-checker">Checker (transparency)</option>
          </select>
        </div>
      </div>
    </details>

    <!-- All widget.json fields are injected here, grouped + collapsible -->
    <div id="fields"></div>
  </aside>

  <script src="../widget/widget.js"></script>
  <script src="./mock-se.js"></script>
</body>
</html>
